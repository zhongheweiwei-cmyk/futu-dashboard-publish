<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>策略命中看板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe7;
      --panel: rgba(255, 250, 242, 0.96);
      --ink: #1b2330;
      --muted: #617082;
      --line: #d9ccb9;
      --accent: #9f4b1f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(193, 122, 73, 0.12), transparent 28%),
        linear-gradient(180deg, #efe2d3 0%, var(--bg) 100%);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }
    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(69, 41, 20, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 30px;
    }
    .sub {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .pill {
      display: inline-block;
      margin-top: 14px;
      margin-right: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #f2e1cd;
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }
    .link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    table {
      width: 100%;
      margin-top: 18px;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(69, 41, 20, 0.08);
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #eadfcc;
      font-size: 15px;
    }
    th {
      background: #efdfca;
      color: #6c3d1f;
      font-weight: 700;
    }
    tbody tr:nth-child(even) {
      background: rgba(248, 240, 231, 0.72);
    }
    tbody tr:last-child td {
      border-bottom: 0;
    }
    .empty {
      margin-top: 18px;
      padding: 24px;
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 18px;
      color: var(--muted);
    }
    @media (max-width: 640px) {
      h1 { font-size: 24px; }
      th, td { padding: 12px 10px; font-size: 13px; }
      main { padding: 18px 12px 28px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>策略命中看板</h1>
      <div class="sub">会话: 20260317_et | 时段: 白天盘 | 生成时间: 2026-03-17 13:49:46</div>
      <div class="pill">命中 0 条</div>
      <a class="link" href="history.html">查看历史归档</a>
    </section>
    <p class='empty'>本时段暂无命中</p>
  </main>
</body>
</html>
